<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        form {
            background: white;
            padding: 25px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
        }

        input[type="submit"] {
            background: #4CAF50;
            color: white;
            border: none;
            margin-top: 15px;
            padding: 10px;
            cursor: pointer;
        }

        h3 {
            text-align: center;
            margin-top: 20px;
            color: blue;
        }
    </style>
</head>

<body>

<h2>California Housing Price Predictor</h2>

<form method="post">

Median Income:
<input type="text" name="f1" required>

House Age:
<input type="text" name="f2" required>

Average Rooms:
<input type="text" name="f3" required>

Average Bedrooms:
<input type="text" name="f4" required>

Population:
<input type="text" name="f5" required>

Average Occupancy:
<input type="text" name="f6" required>

Latitude:
<input type="text" name="f7" required>

Longitude:
<input type="text" name="f8" required>

<input type="submit" value="Predict House Price">

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
